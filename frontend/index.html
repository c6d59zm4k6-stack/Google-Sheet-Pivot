<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pivot Table Agent</title>
<style>
  :root {
    --ink: #1c1c1c;
    --paper: #fafaf8;
    --line: #ddd8cf;
    --accent: #2f5d50;
    --accent-soft: #e7efec;
    --muted: #767065;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 {
    font-size: 17px;
    font-weight: 600;
    margin: 0;
  }
  #auth-area a, #auth-area button {
    font-size: 13px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }
  #result-area {
    flex: 1;
    min-height: 160px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    padding: 16px;
    overflow: auto;
  }
  #result-area .placeholder {
    color: var(--muted);
    font-size: 14px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  th, td {
    border: 1px solid var(--line);
    padding: 6px 10px;
    text-align: left;
    white-space: nowrap;
  }
  th {
    background: var(--accent-soft);
    font-weight: 600;
    position: sticky;
    top: 0;
  }
  tr:nth-child(even) td { background: #fbfbf9; }

  #sheet-link {
    font-size: 13px;
    margin-top: 10px;
    display: inline-block;
  }

  #controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .row { display: flex; gap: 10px; }
  select, input[type=text] {
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: white;
    color: var(--ink);
  }
  select { flex: 0 0 220px; }
  input[type=text] { flex: 1; }
  button#submit-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button#submit-btn:disabled {
    background: #9fb3ac;
    cursor: not-allowed;
  }
  #message {
    font-size: 13px;
    color: #a0442f;
    min-height: 16px;
  }
  #login-gate {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  #login-gate a {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 20px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>Pivot Table Agent</h1>
  <div id="auth-area"></div>
</header>

<main>
  <div id="result-area">
    <div class="placeholder">Your pivot table will show up here.</div>
  </div>

  <div id="controls" style="display:none;">
    <div class="row">
      <select id="file-select">
        <option value="">Select a file…</option>
      </select>
      <input type="text" id="request-input" placeholder="e.g. total revenue by region and month" />
      <button id="submit-btn">Generate</button>
    </div>
    <div id="message"></div>
  </div>

  <div id="login-gate">
    <p>Sign in with Google to get started.</p>
    <a href="/login">Sign in with Google</a>
  </div>
</main>

<script>
  // Change this if your backend runs somewhere other than the same origin.
  const API_BASE = "";

  const authArea = document.getElementById("auth-area");
  const controls = document.getElementById("controls");
  const loginGate = document.getElementById("login-gate");
  const fileSelect = document.getElementById("file-select");
  const requestInput = document.getElementById("request-input");
  const submitBtn = document.getElementById("submit-btn");
  const messageEl = document.getElementById("message");
  const resultArea = document.getElementById("result-area");

  async function checkStatus() {
    const res = await fetch(`${API_BASE}/status`, { credentials: "include" });
    const data = await res.json();
    if (data.logged_in) {
      loginGate.style.display = "none";
      controls.style.display = "flex";
      authArea.innerHTML = `<button onclick="location.href='/logout'">Sign out</button>`;
      loadFiles();
    } else {
      loginGate.style.display = "block";
      controls.style.display = "none";
      authArea.innerHTML = "";
    }
  }

  async function loadFiles() {
    fileSelect.innerHTML = `<option value="">Loading files…</option>`;
    const res = await fetch(`${API_BASE}/list-files`, { credentials: "include" });
    const data = await res.json();
    if (data.error) {
      fileSelect.innerHTML = `<option value="">Could not load files</option>`;
      return;
    }
    fileSelect.innerHTML = `<option value="">Select a file…</option>`;
    data.files.forEach(f => {
      const opt = document.createElement("option");
      opt.value = f.id;
      opt.dataset.mime = f.mimeType;
      opt.textContent = f.name;
      fileSelect.appendChild(opt);
    });
  }

  function renderPivot(pivotRows, columns) {
    if (!pivotRows.length) {
      resultArea.innerHTML = `<div class="placeholder">No results.</div>`;
      return;
    }
    let html = "<table><thead><tr>";
    columns.forEach(c => html += `<th>${c}</th>`);
    html += "</tr></thead><tbody>";
    pivotRows.forEach(row => {
      html += "<tr>";
      columns.forEach(c => html += `<td>${row[c] ?? ""}</td>`);
      html += "</tr>";
    });
    html += "</tbody></table>";
    resultArea.innerHTML = html;
  }

  submitBtn.addEventListener("click", async () => {
    messageEl.textContent = "";
    const fileId = fileSelect.value;
    const mimeType = fileSelect.selectedOptions[0]?.dataset.mime;
    const requestText = requestInput.value.trim();

    if (!fileId) {
      messageEl.textContent = "Please select a file.";
      return;
    }
    if (!requestText) {
      messageEl.textContent = "Please describe the pivot you want.";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Generating…";
    resultArea.innerHTML = `<div class="placeholder">Working on it…</div>`;

    try {
      const res = await fetch(`${API_BASE}/generate-pivot`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ file_id: fileId, mime_type: mimeType, request: requestText }),
      });
      const data = await res.json();

      if (data.error) {
        messageEl.textContent = data.message || "Something went wrong.";
        resultArea.innerHTML = `<div class="placeholder">Nothing to show yet.</div>`;
        return;
      }

      renderPivot(data.pivot, data.columns);
      if (data.sheet_tab_url) {
        resultArea.innerHTML += `<a id="sheet-link" href="${data.sheet_tab_url}" target="_blank">Open this pivot in Google Sheets →</a>`;
      }
    } catch (e) {
      messageEl.textContent = "Network error — please try again.";
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Generate";
    }
  });

  checkStatus();
</script>

</body>
</html>
