<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pivot Table Agent</title>
<style>
  :root {
    --ink: #1c1c1c;
    --paper: #fafaf8;
    --line: #ddd8cf;
    --accent: #2f5d50;
    --accent-soft: #e7efec;
    --muted: #767065;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 {
    font-size: 17px;
    font-weight: 600;
    margin: 0;
  }
  #auth-area a, #auth-area button {
    font-size: 13px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }
  #result-area {
    flex: 1;
    min-height: 160px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: white;
    padding: 16px;
    overflow: auto;
  }
  #result-area .placeholder {
    color: var(--muted);
    font-size: 14px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  th, td {
    border: 1px solid var(--line);
    padding: 6px 10px;
    text-align: left;
    white-space: nowrap;
  }
  th {
    background: var(--accent-soft);
    font-weight: 600;
    position: sticky;
    top: 0;
  }
  tr:nth-child(even) td { background: #fbfbf9; }

  #sheet-link {
    font-size: 13px;
    margin-top: 10px;
    display: inline-block;
  }

  #controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .row { display: flex; gap: 10px; }
  select, input[type=text] {
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: white;
    color: var(--ink);
  }
  select { flex: 0 0 220px; }
  input[type=text] { flex: 1; }
  button#submit-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button#submit-btn:disabled {
    background: #9fb3ac;
    cursor: not-allowed;
  }
  button#browse-btn {
    padding: 10px 16px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: white;
    color: var(--ink);
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  button#browse-btn:hover { background: var(--accent-soft); }
  #selected-file-label {
    font-size: 13px;
    color: var(--muted);
    align-self: center;
  }
  #message {
    font-size: 13px;
    color: #a0442f;
    min-height: 16px;
  }
  #login-gate {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  #login-gate a {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 20px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
  }
</style>
</head>
<body>
<script src="https://apis.google.com/js/api.js"></script>

<header>
  <h1>Pivot Table Agent</h1>
  <div id="auth-area"></div>
</header>

<main>
  <div id="result-area">
    <div class="placeholder">Your pivot table will show up here.</div>
  </div>

  <div id="controls" style="display:none;">
    <div class="row">
      <button id="browse-btn" type="button">Choose file from Drive…</button>
      <span id="selected-file-label">No file selected</span>
      <select id="tab-select" style="display:none;"></select>
    </div>
    <div class="row">
      <input type="text" id="request-input" placeholder="e.g. total revenue by region and month" />
      <button id="submit-btn">Generate</button>
    </div>
    <div id="message"></div>
  </div>

  <div id="login-gate">
    <p>Sign in with Google to get started.</p>
    <a href="/login">Sign in with Google</a>
  </div>
</main>

<script>
  // Change this if your backend runs somewhere other than the same origin.
  const API_BASE = "";

  const authArea = document.getElementById("auth-area");
  const controls = document.getElementById("controls");
  const loginGate = document.getElementById("login-gate");
  const browseBtn = document.getElementById("browse-btn");
  const selectedFileLabel = document.getElementById("selected-file-label");
  const tabSelect = document.getElementById("tab-select");
  const requestInput = document.getElementById("request-input");
  const submitBtn = document.getElementById("submit-btn");
  const messageEl = document.getElementById("message");
  const resultArea = document.getElementById("result-area");

  let selectedFile = null; // { id, name, mimeType }
  let selectedSheetTab = null; // tab name, only relevant for native Google Sheets
  let pickerLibLoaded = false;
  gapi.load("picker", () => { pickerLibLoaded = true; });

  async function checkStatus() {
    const res = await fetch(`${API_BASE}/status`, { credentials: "include" });
    const data = await res.json();
    if (data.logged_in) {
      loginGate.style.display = "none";
      controls.style.display = "flex";
      authArea.innerHTML = `<button onclick="location.href='/logout'">Sign out</button>`;
    } else {
      loginGate.style.display = "block";
      controls.style.display = "none";
      authArea.innerHTML = "";
    }
  }

  async function openPicker() {
    messageEl.textContent = "";
    const res = await fetch(`${API_BASE}/picker-token`, { credentials: "include" });
    const data = await res.json();
    if (data.error) {
      messageEl.textContent = data.message || "Could not open Google Drive.";
      return;
    }

    const buildAndShow = () => {
      // ViewId.DOCS shows all file types and lets the user navigate folders;
      // setMimeTypes restricts which files are *selectable* (folders stay
      // navigable regardless).
      const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
        .setIncludeFolders(true)
        .setSelectFolderEnabled(false)
        .setMimeTypes(
          "application/vnd.google-apps.spreadsheet,text/csv," +
          "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        );
      const picker = new google.picker.PickerBuilder()
        .addView(view)
        .setOAuthToken(data.access_token)
        .setDeveloperKey(data.api_key)
        .setCallback(pickerCallback)
        .build();
      picker.setVisible(true);
    };

    if (pickerLibLoaded) {
      buildAndShow();
    } else {
      gapi.load("picker", buildAndShow);
    }
  }

  function pickerCallback(data) {
    if (data.action === google.picker.Action.PICKED) {
      const doc = data.docs[0];
      selectedFile = { id: doc.id, name: doc.name, mimeType: doc.mimeType };
      selectedFileLabel.textContent = doc.name;
      selectedSheetTab = null;
      tabSelect.style.display = "none";
      tabSelect.innerHTML = "";

      if (doc.mimeType === "application/vnd.google-apps.spreadsheet") {
        loadSheetTabs(doc.id);
      }
    }
  }

  async function loadSheetTabs(fileId) {
    try {
      const res = await fetch(`${API_BASE}/sheet-tabs?file_id=${encodeURIComponent(fileId)}`, { credentials: "include" });
      const data = await res.json();
      if (data.error || !data.tabs || data.tabs.length <= 1) {
        // Only one tab (or lookup failed) — nothing to choose, just use the default.
        return;
      }
      tabSelect.innerHTML = "";
      data.tabs.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        tabSelect.appendChild(opt);
      });
      selectedSheetTab = data.tabs[0];
      tabSelect.style.display = "inline-block";
    } catch (e) {
      // Non-fatal: fall back to the default (first) tab.
    }
  }

  tabSelect.addEventListener("change", () => {
    selectedSheetTab = tabSelect.value;
  });

  function renderPivot(pivotRows, columns) {
    if (!pivotRows.length) {
      resultArea.innerHTML = `<div class="placeholder">No results.</div>`;
      return;
    }
    let html = "<table><thead><tr>";
    columns.forEach(c => html += `<th>${c}</th>`);
    html += "</tr></thead><tbody>";
    pivotRows.forEach(row => {
      html += "<tr>";
      columns.forEach(c => html += `<td>${row[c] ?? ""}</td>`);
      html += "</tr>";
    });
    html += "</tbody></table>";
    resultArea.innerHTML = html;
  }

  browseBtn.addEventListener("click", openPicker);

  submitBtn.addEventListener("click", async () => {
    messageEl.textContent = "";
    const requestText = requestInput.value.trim();

    if (!selectedFile) {
      messageEl.textContent = "Please choose a file from Google Drive.";
      return;
    }
    if (!requestText) {
      messageEl.textContent = "Please describe the pivot you want.";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Generating…";
    resultArea.innerHTML = `<div class="placeholder">Working on it…</div>`;

    try {
      const res = await fetch(`${API_BASE}/generate-pivot`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          file_id: selectedFile.id,
          mime_type: selectedFile.mimeType,
          sheet_tab: selectedSheetTab,
          request: requestText,
        }),
      });
      const data = await res.json();

      if (data.error) {
        messageEl.textContent = data.message || "Something went wrong.";
        resultArea.innerHTML = `<div class="placeholder">Nothing to show yet.</div>`;
        return;
      }

      renderPivot(data.pivot, data.columns);
      if (data.sheet_tab_url) {
        resultArea.innerHTML += `<a id="sheet-link" href="${data.sheet_tab_url}" target="_blank">Open this pivot in Google Sheets →</a>`;
      }
      if (data.warning) {
        messageEl.textContent = data.warning;
      }
    } catch (e) {
      messageEl.textContent = "Network error — please try again.";
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Generate";
    }
  });

  checkStatus();
</script>

</body>
</html>
